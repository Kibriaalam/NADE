const G = C; // alias

function Badge({children,color=C.g3,bg=C.gp,style={}}){

function Stars({r}){
  return <span style={{color:C.gold,fontSize:12}}>{"★".repeat(Math.round(r))}{"☆".repeat(5-Math.round(r))} <span style={{color:C.muted}}>{r}</span></span>;

function Modal({children,onClose,title}){

function Toast({icon,title,subtitle,color=C.g1}){

function Btn({children,onClick,disabled,color=C.g1,color2=C.g3,style={},outlined=false}){

    <button onClick={onClick} disabled={disabled} style={{

function LabourModule(){
  const [tab,setTab]=useState("jobs");

  const [selJob,setSelJob]=useState(null);

  const [form,setForm]=useState({title:"",type:"",needed:"",wage:"",days:"",location:"",startDate:""});

  const fire=(icon,title,sub)=>{setToast({icon,title,sub});setTimeout(()=>setToast(null),2800);};
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const approved=j=>j.applicants.filter(a=>a.status==="approved").length;
  const pending=j=>j.applicants.filter(a=>a.status==="pending").length;

  const postJob=()=>{
    if(!form.title||!form.needed||!form.wage)return;
    setJobs(p=>[{id:Date.now(),title:form.title,type:form.type||"সাধারণ",needed:parseInt(form.needed),wage:parseInt(form.wage),days:parseInt(form.days)||1,location:form.location||"নওগাঁ",startDate:form.startDate||"শীঘ্রই",status:"active",applicants:[]},...p]);

    setTab("jobs");
    fire("📢","বিজ্ঞাপন প্রকাশিত!","শ্রমিকরা এখন আবেদন করতে পারবেন");
  };

  const action=(jobId,aId,act)=>{
    setJobs(p=>p.map(j=>j.id!==jobId?j:{...j,applicants:j.applicants.map(a=>a.id===aId?{...a,status:act}:a)}));

      {tab==="forecast"&&<>

          <div key={i} style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:8,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1.5px solid #e3f2fd",display:"flex",alignItems:"center",gap:10}}>

          </div>

        <div style={{background:"#fff3e0",borderRadius:12,padding:12,fontSize:12,color:C.orange}}>
          ⚠️ শুক্রবার ভারী বৃষ্টির কারণে ফসল কাটা ও পরিবহন পরিকল্পনা আগেভাগে করুন
        </div>
      </>}

      {tab==="tips"&&<>
        <StatRow items={[["৩৪°","তাপমাত্রা",C.red,C.redp],["৭২%","আর্দ্রতা",C.blue,C.bluep],["৮৫%","কাল বৃষ্টি",C.orange,C.orangep]]}/>

              <div style={{fontSize:32,flexShrink:0}}>{t.icon}</div>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:C.g1,marginBottom:4}}>{t.crop}</div>
                <div style={{fontSize:13,color:C.sub,lineHeight:1.6}}>{t.tip}</div>

        <div style={{background:`linear-gradient(135deg,${C.g1},${C.g3})`,borderRadius:14,padding:14,color:"#fff"}}>

          {[["আজ-কাল","পাকা ফসল দ্রুত সংগ্রহ করুন"],["বৃহস্পতি","সার দেওয়ার আদর্শ সময়"],["শুক্র-শনি","বৃষ্টি — মাঠের কাজ বন্ধ রাখুন"],["রবি","বৃষ্টির পর মাটি পরীক্ষা করুন"]].map(([d,t])=>(

// ── AI ADVISORY MODULE ────────────────────────────────────
function AdvisoryModule(){
  const [tab,setTab]=useState("chat");
  const [messages,setMessages]=useState([
    {role:"assistant",content:"আস্সালামুআলাইকুম! আমি NADE-এর কৃষি AI সহকারী। আমাকে যেকোনো কৃষি সমস্যা, ফসল ব্যবস্থাপনা, বা বাজার পরিকল্পনা নিয়ে জিজ্ঞেস করতে পারেন। 🌾"}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [calcCrop,setCalcCrop]=useState("আম");
  const [calcQty,setCalcQty]=useState("");
  const [calcResult,setCalcResult]=useState(null);
  const [calcLoading,setCalcLoading]=useState(false);
  const msgRef=useRef(null);

  useEffect(()=>{if(msgRef.current)msgRef.current.scrollTop=msgRef.current.scrollHeight;},[messages]);

  const QUICK_Q=[
    "আমার আমে কালো দাগ পড়েছে — কী করব?",
    "এই মৌসুমে কোন ফসল সবচেয়ে লাভজনক?",
    "জৈব সার তৈরি কীভাবে করব?",
    "ধান চাষে কতটুকু পানি দরকার?",
    "টমেটোর হলুদ পাতা কেন হয়?",
  ];

  const sendMsg = async (text) => {
    const userMsg = text || input.trim();
    if(!userMsg) return;
    setInput("");
    setMessages(p=>[...p,{role:"user",content:userMsg}]);
    setLoading(true);
    try {
      const history = [...messages, {role:"user",content:userMsg}];
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are NADE-এর কৃষি AI সহকারী, a helpful agricultural AI assistant for farmers in Naogaon district, Bangladesh. 
Always respond in Bengali (Bangla). Be practical, simple, and helpful. 
Focus on: crop management, pest control, soil health, market prices, weather impact on farming, organic methods.
Keep responses concise (3-5 sentences max). Use emojis to make it friendly.
Context: Naogaon is famous for mango, rice, wheat, potato farming.`,
          messages: history.map(m=>({role:m.role,content:m.content}))
        })
      });
      const d = await res.json();
      setMessages(p=>[...p,{role:"assistant",content:d.content[0].text}]);
    } catch(e){ setMessages(p=>[...p,{role:"assistant",content:"দুঃখিত, এই মুহূর্তে সংযোগ সমস্যা হচ্ছে। একটু পরে আবার চেষ্টা করুন। 🙏"}]); }
    setLoading(false);
  };

  const calcProfit = async () => {
    if(!calcQty) return;
    setCalcLoading(true);
    const priceMap={"আম":85,"ধান":32,"আলু":28,"গম":42,"টমেটো":60,"পেঁয়াজ":55};
    const price = priceMap[calcCrop]||50;
    const qty = parseInt(calcQty);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:600,
          system:"You are an agricultural profit calculator for Bangladeshi farmers. Respond ONLY in JSON format: {\"gross\":number,\"cost\":number,\"net\":number,\"tips\":\"string in Bengali\",\"bestTime\":\"string in Bengali\"}. No other text.",
          messages:[{role:"user",content:`Calculate profit for ${qty} kg of ${calcCrop} at ৳${price}/kg NADE price. Estimate realistic costs (labor, transport, packaging) for Naogaon, Bangladesh. Provide tips in Bengali.`}]
        })
      });
      const d = await res.json();
      const text = d.content[0].text.replace(/```json|```/g,"").trim();
      setCalcResult({...JSON.parse(text), crop:calcCrop, qty, price});
    } catch(e){ setCalcResult({gross:price*qty, cost:Math.round(price*qty*0.3), net:Math.round(price*qty*0.7), tips:"হিসাব করা হয়েছে।", crop:calcCrop, qty, price}); }
    setCalcLoading(false);
  };

  return(
    <div className="fade-up">
      <TabBar tabs={[["chat","AI চ্যাট"],["calc","লাভ হিসাব"],["schedule","ফসল পরিকল্পনা"]]} active={tab} onChange={setTab} color={C.purple}/>

      {tab==="chat"&&<>
        <div style={{background:`linear-gradient(135deg,${C.purple},#9c27b0)`,borderRadius:14,padding:14,marginBottom:14,color:"#fff"}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>🤖 NADE কৃষি AI সহকারী</div>
          <div style={{fontSize:12,opacity:.85}}>Claude AI দ্বারা পরিচালিত · বাংলায় কথা বলুন</div>
        </div>

        {/* Quick questions */}
        <div style={{marginBottom:12,overflowX:"auto",whiteSpace:"nowrap",paddingBottom:4}}>
          {QUICK_Q.map((q,i)=>(
            <button key={i} onClick={()=>sendMsg(q)} style={{display:"inline-block",marginRight:8,background:C.purplep,color:C.purple,border:`1px solid ${C.purple}33`,borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
              {q.length>20?q.slice(0,20)+"...":q}
            </button>
          ))}
        </div>

        {/* Messages */}
        <div ref={msgRef} style={{background:C.white,borderRadius:16,padding:14,marginBottom:12,minHeight:260,maxHeight:360,overflowY:"auto",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",border:"1.5px solid #e8f5e9"}}>
          {messages.map((m,i)=>(
            <div key={i} style={{marginBottom:12,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"82%",background:m.role==="user"?`linear-gradient(135deg,${C.g1},${C.g3})`:"#f5f5f5",color:m.role==="user"?"#fff":C.text,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 13px",fontSize:13,lineHeight:1.6}}>
                {m.role==="assistant"&&<div style={{fontSize:10,color:C.purple,fontWeight:700,marginBottom:4}}>🤖 NADE AI</div>}
                {m.content}
              </div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:6,alignItems:"center",padding:"8px 12px"}}>
              {[0,1,2].map(i=><div key={i} style={{width:8,height:8,background:C.purple,borderRadius:"50%",animation:`pulse 1s ${i*0.2}s infinite`}}/>)}
              <span style={{fontSize:11,color:C.muted}}>AI ভাবছে...</span>
            </div>
          )}
        </div>

        {/* Input */}
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&sendMsg()} placeholder="আপনার প্রশ্ন লিখুন..." style={{flex:1,padding:"12px 14px",border:`2px solid ${C.purple}44`,borderRadius:12,fontSize:14,outline:"none"}} disabled={loading}/>
          <button onClick={()=>sendMsg()} disabled={loading||!input.trim()} style={{background:loading?"#ddd":`linear-gradient(135deg,${C.purple},#9c27b0)`,color:"#fff",border:"none",borderRadius:12,padding:"12px 16px",fontSize:18,cursor:loading?"wait":"pointer"}}>{loading?"⏳":"➤"}</button>
        </div>
      </>}

      {tab==="calc"&&<>
        <Card style={{marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:15,color:C.purple,marginBottom:14}}>💰 AI লাভ-ক্ষতি হিসাব</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:6}}>ফসলের ধরন</div>
            <select value={calcCrop} onChange={e=>{setCalcCrop(e.target.value);setCalcResult(null);}} style={{width:"100%",padding:"11px 13px",border:`1.5px solid ${C.purple}44`,borderRadius:10,fontSize:14,outline:"none"}}>
              {["আম","ধান","আলু","গম","টমেটো","পেঁয়াজ"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:6}}>পরিমাণ (কেজি)</div>
            <input type="number" placeholder="যেমন: ৫০০" value={calcQty} onChange={e=>{setCalcQty(e.target.value);setCalcResult(null);}} style={{width:"100%",padding:"11px 13px",border:`1.5px solid ${C.purple}44`,borderRadius:10,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <button onClick={calcProfit} disabled={!calcQty||calcLoading} style={{width:"100%",background:!calcQty||calcLoading?"#ddd":`linear-gradient(135deg,${C.purple},#9c27b0)`,color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {calcLoading?"⏳ AI হিসাব করছে...":"🤖 AI দিয়ে হিসাব করুন"}
          </button>
        </Card>

        {calcResult&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            <div style={{background:`linear-gradient(135deg,${C.g1},${C.g3})`,borderRadius:16,padding:16,marginBottom:14,color:"#fff"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12,opacity:.9}}>{calcResult.crop} — {calcResult.qty} কেজি</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {[["মোট আয়","৳"+calcResult.gross.toLocaleString(),"#fff"],["খরচ","৳"+calcResult.cost.toLocaleString(),"#ffcdd2"],["নীট লাভ","৳"+calcResult.net.toLocaleString(),"#b9f6ca"]].map(([l,v,c])=>(
                  <div key={l} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:10,textAlign:"center"}}>
                    <div style={{fontSize:10,opacity:.8,marginBottom:4}}>{l}</div>

// ── DISEASE MODULE ────────────────────────────────────────
function DiseaseModule(){
  const [tab,setTab]=useState("diagnose");
  const [image,setImage]=useState(null);
  const [imageData,setImageData]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [selectedCrop,setSelectedCrop]=useState("আম");
  const [symptoms,setSymptoms]=useState([]);
  const [textDiag,setTextDiag]=useState(null);
  const [textLoading,setTextLoading]=useState(false);
  const fileRef=useRef(null);

  const SYMPTOM_OPTS=["পাতায় হলুদ দাগ","কালো দাগ","পোকার কামড়","ঝরে পড়ছে","পচন ধরেছে","ছত্রাক দেখা যাচ্ছে","শুকিয়ে যাচ্ছে","বিবর্ণ হয়েছে"];

  const COMMON_DISEASES=[
    {crop:"আম",disease:"অ্যানথ্রাকনোজ",symptoms:"কালো-বাদামি দাগ",treatment:"কপার ফাঙ্গিসাইড স্প্রে · সংক্রমিত অংশ কেটে ফেলুন",severity:"মাঝারি",icon:"🥭"},
    {crop:"ধান",disease:"ব্লাস্ট রোগ",symptoms:"পাতায় ধূসর ডিম্বাকার দাগ",treatment:"ট্রাইসাইক্লাজল স্প্রে · নাইট্রোজেন কমান",severity:"উচ্চ",icon:"🌾"},
    {crop:"আলু",disease:"লেট ব্লাইট",symptoms:"পাতায় জলীয় দাগ, পচা গন্ধ",treatment:"ম্যানকোজেব স্প্রে · আক্রান্ত গাছ সরান",severity:"উচ্চ",icon:"🥔"},
    {crop:"টমেটো",disease:"আর্লি ব্লাইট",symptoms:"বৃদ্ধ পাতায় গাঢ় দাগ",treatment:"ক্লোরোথালোনিল স্প্রে · সুষম সার দিন",severity:"মাঝারি",icon:"🍅"},
  ];

  const handleImage = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    setImage(URL.createObjectURL(file));
    setResult(null);
    const reader = new FileReader();
    reader.onload = ev => setImageData(ev.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  };

  const diagnoseImage = async () => {
    if(!imageData) return;
    setLoading(true);
    setResult(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are an expert plant disease diagnostician for Bangladeshi farmers. Analyze crop images and provide diagnosis in Bengali. 
Respond ONLY in this JSON format: {"disease":"disease name in Bengali","confidence":"high/medium/low","severity":"উচ্চ/মাঝারি/কম","symptoms":"list of visible symptoms in Bengali","treatment":["step1","step2","step3"],"prevention":"prevention tips in Bengali","urgency":"এখনই ব্যবস্থা নিন/এই সপ্তাহে/পর্যবেক্ষণ করুন"}
If not a plant image, set disease to "ফসলের ছবি নয়".`,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageData}},
            {type:"text",text:`এই ফসলের ছবি বিশ্লেষণ করুন। ফসল: ${selectedCrop}। রোগ নির্ণয় করুন এবং চিকিৎসা বলুন।`}
          ]}]
        })
      });
      const d = await res.json();
      const text = d.content[0].text.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(text));
    } catch(e){ setResult({disease:"বিশ্লেষণ ব্যর্থ",confidence:"low",severity:"অজানা",symptoms:"ছবি পড়া যায়নি",treatment:["পুনরায় চেষ্টা করুন"],prevention:"",urgency:"পর্যবেক্ষণ করুন"}); }
    setLoading(false);
  };

  const diagnoseBySymptoms = async () => {
    if(symptoms.length===0) return;
    setTextLoading(true);
    setTextDiag(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:800,
          system:`You are a plant disease expert for Bangladesh. Diagnose based on symptoms. Respond ONLY in JSON: {"disease":"Bengali name","treatment":["step1 in Bengali","step2","step3"],"medicine":"specific medicine name","prevention":"Bengali text","urgency":"এখনই/এই সপ্তাহে/পর্যবেক্ষণ"}`,
          messages:[{role:"user",content:`ফসল: ${selectedCrop}। লক্ষণ: ${symptoms.join(", ")}। রোগ নির্ণয় ও চিকিৎসা বলুন।`}]
        })
      });
      const d = await res.json();
      const text = d.content[0].text.replace(/```json|```/g,"").trim();
      setTextDiag(JSON.parse(text));
    } catch(e){ setTextDiag({disease:"তথ্য অপর্যাপ্ত",treatment:["কৃষি অফিসে যোগাযোগ করুন"],medicine:"",prevention:"",urgency:"পর্যবেক্ষণ"}); }
    setTextLoading(false);
  };

  const sevColor=s=>s==="উচ্চ"?C.red:s==="মাঝারি"?C.orange:C.g1;

  return(
    <div className="fade-up">
      <TabBar tabs={[["diagnose","ছবি দিয়ে রোগ নির্ণয়"],["symptoms","লক্ষণ দিয়ে"],["library","রোগের তালিকা"]]} active={tab} onChange={setTab} color={C.red}/>

      {tab==="diagnose"&&<>
        <div style={{background:"linear-gradient(135deg,#c62828,#e53935)",borderRadius:14,padding:14,marginBottom:14,color:"#fff"}}>
          <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>🔬 AI ফসল রোগ নির্ণয়</div>
          <div style={{fontSize:12,opacity:.85}}>ফসলের ছবি তুলুন — Claude AI তাৎক্ষণিক রোগ চিহ্নিত করবে</div>
        </div>

        <Card style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:8}}>ফসলের ধরন বেছে নিন</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
            {["আম","ধান","আলু","গম","টমেটো","পেঁয়াজ"].map(c=>(
              <button key={c} onClick={()=>setSelectedCrop(c)} style={{background:selectedCrop===c?C.red:"#f5f5f5",color:selectedCrop===c?"#fff":C.text,border:"none",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                {c}
              </button>
            ))}
          </div>

          {/* Image upload area */}
          <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${image?"#e53935":"#c8e6c9"}`,borderRadius:14,padding:image?4:30,textAlign:"center",cursor:"pointer",marginBottom:14,background:image?"#fff":"#fafafa",transition:"all .2s"}}>
            {image?(
              <img src={image} style={{width:"100%",borderRadius:12,maxHeight:200,objectFit:"cover"}} alt="crop"/>
            ):(
              <>
                <div style={{fontSize:48,marginBottom:8}}>📷</div>
                <div style={{fontWeight:700,fontSize:14,color:C.g1}}>ছবি তুলুন বা আপলোড করুন</div>
                <div style={{fontSize:12,color:C.muted,marginTop:4}}>আক্রান্ত পাতা বা ফলের কাছ থেকে ছবি তুলুন</div>
              </>
            )}
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleImage} style={{display:"none"}}/>
          </div>

          {image&&!result&&(
            <button onClick={diagnoseImage} disabled={loading} style={{width:"100%",background:loading?"#ddd":"linear-gradient(135deg,#c62828,#e53935)",color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {loading?"⏳ AI বিশ্লেষণ করছে...":"🔬 রোগ নির্ণয় করুন"}
            </button>
          )}
          {image&&result&&(
            <button onClick={()=>{setImage(null);setImageData(null);setResult(null);fileRef.current.value="";}} style={{width:"100%",background:"#f5f5f5",color:C.text,border:"none",borderRadius:12,padding:10,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
              🔄 নতুন ছবি দিন
            </button>
          )}
        </Card>

        {result&&(
          <div style={{animation:"fadeUp .3s ease both"}}>
            <div style={{background:C.redp,border:`2px solid ${sevColor(result.severity)}`,borderRadius:16,padding:16,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:18,color:C.red}}>{result.disease}</div>
                  <div style={{fontSize:12,color:C.sub,marginTop:2}}>🔬 নির্ভুলতা: {result.confidence==="high"?"উচ্চ ✓":result.confidence==="medium"?"মাঝারি":"কম"}</div>
                </div>
                <div style={{background:sevColor(result.severity),color:"#fff",borderRadius:10,padding:"4px 10px",fontSize:12,fontWeight:700}}>{result.severity} ঝুঁকি</div>
              </div>
              <div style={{background:"rgba(198,40,40,0.1)",borderRadius:10,padding:10,marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:4}}>⚡ {result.urgency}</div>
                <div style={{fontSize:13,color:C.sub}}>{result.symptoms}</div>
              </div>
              <div style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:8}}>💊 চিকিৎসা পদক্ষেপ:</div>
              {(Array.isArray(result.treatment)?result.treatment:[result.treatment]).map((t,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:6,fontSize:13,color:C.sub}}>
                  <div style={{width:22,height:22,background:C.red,color:"#fff",borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{i+1}</div>
                  {t}
                </div>
              ))}
              {result.prevention&&<div style={{background:C.gp,borderRadius:10,padding:10,marginTop:10,fontSize:12,color:C.g1}}>🛡️ প্রতিরোধ: {result.prevention}</div>}
            </div>
            <div style={{background:C.brownp,borderRadius:12,padding:12,fontSize:12,color:C.brown}}>
              📞 কৃষি অফিসে যোগাযোগ: নওগাঁ সদর উপজেলা কৃষি অফিস · ০১৭XX-XXXXXX
            </div>
          </div>
        )}
      </>}

      {tab==="symptoms"&&<>
        <Card style={{marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:15,color:C.red,marginBottom:14}}>📋 লক্ষণ দিয়ে রোগ খুঁজুন</div>
          <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:8}}>ফসল বেছে নিন</div>
          <select value={selectedCrop} onChange={e=>{setSelectedCrop(e.target.value);setSymptoms([]);setTextDiag(null);}} style={{width:"100%",padding:"10px 13px",border:"1.5px solid #ffcdd2",borderRadius:10,fontSize:14,outline:"none",marginBottom:14}}>
            {["আম","ধান","আলু","গম","টমেটো","পেঁয়াজ"].map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:8}}>কী কী সমস্যা দেখছেন? (একাধিক বেছে নিন)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {SYMPTOM_OPTS.map(s=>(
              <button key={s} onClick={()=>setSymptoms(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s])} style={{background:symptoms.includes(s)?C.red:"#f5f5f5",color:symptoms.includes(s)?"#fff":C.text,border:"none",borderRadius:20,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                {symptoms.includes(s)?"✓ ":""}{s}
              </button>
            ))}
          </div>
          <button onClick={diagnoseBySymptoms} disabled={symptoms.length===0||textLoading} style={{width:"100%",background:symptoms.length===0||textLoading?"#ddd":"linear-gradient(135deg,#c62828,#e53935)",color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {textLoading?"⏳ AI নির্ণয় করছে...":"🔍 রোগ খুঁজুন"}
          </button>
        </Card>

        {textDiag&&(
          <Card style={{borderColor:"#ffcdd2",animation:"fadeUp .3s ease both"}}>
            <div style={{fontWeight:800,fontSize:16,color:C.red,marginBottom:4}}>{textDiag.disease}</div>
            <div style={{fontSize:11,background:C.redp,color:C.red,borderRadius:8,padding:"3px 10px",display:"inline-block",marginBottom:12,fontWeight:700}}>⚡ {textDiag.urgency}</div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>💊 চিকিৎসা:</div>
            {textDiag.treatment.map((t,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:6,fontSize:13,color:C.sub}}>
                <span style={{color:C.red,fontWeight:700,flexShrink:0}}>{i+1}.</span>{t}
              </div>
            ))}
            {textDiag.medicine&&<div style={{background:"#fff3e0",borderRadius:10,padding:10,marginTop:10,fontSize:12,color:C.orange}}>💊 ওষুধ: {textDiag.medicine}</div>}
          </Card>
        )}
      </>}

      {tab==="library"&&<>
        <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:10}}>📚 সাধারণ রোগের তালিকা</div>
        {COMMON_DISEASES.map((d,i)=>(
          <Card key={i} style={{marginBottom:10,borderColor:sevColor(d.severity)+"33"}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{fontSize:34,flexShrink:0}}>{d.icon}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{d.disease}</div>
                    <div style={{fontSize:12,color:C.sub}}>{d.crop}</div>
                  </div>
                  <div style={{background:sevColor(d.severity),color:"#fff",borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>{d.severity}</div>
                </div>
                <Divider/>
                <div style={{fontSize:12,color:C.sub,marginBottom:6}}><b>লক্ষণ:</b> {d.symptoms}</div>
                <div style={{background:C.gp,borderRadius:8,padding:8,fontSize:12,color:C.g1}}><b>চিকিৎসা:</b> {d.treatment}</div>
              </div>
            </div>
          </Card>
        ))}
        <div style={{background:C.brownp,borderRadius:12,padding:12,fontSize:12,color:C.brown}}>
          📞 কৃষি বিশেষজ্ঞের পরামর্শ: উপজেলা কৃষি অফিস · হটলাইন: ১৬১২৩
        </div>
      </>}
    </div>
  );
}
